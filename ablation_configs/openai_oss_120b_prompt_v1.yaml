run_name: openai_oss_120b

llm_params:
  model: openai/gpt-oss-120b
  api_key: ${openai_key}
  api_base: https://chat.kiconnect.nrw/api/v1/
  temperature: 1
  max_tokens: 8192

harness_params:
  prompt_file: openai_oss_120b_prompt_v1.txt
  output_dir: openai_oss_120b_prompt_v1
  curated_data_path: curated_data_json_by_doi.json
  curated_data_markdown_dir: curated_data_markdown_by_doi
  n_shots: 4
  shot_selection: random
  seed: 123
  evaluation:
    tp_threshold: 0.3
    catalyst_threshold: 0.8
    numeric_tolerance: 0.2

