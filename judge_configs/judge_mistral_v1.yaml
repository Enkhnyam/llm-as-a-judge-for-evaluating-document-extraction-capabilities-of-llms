run_name: judge_mistral

# Judge model MUST differ from the extractor (self-preference bias); extractor is gpt-oss-120b.
llm_params:
  model: openai/mistral-small-4-119b-2603
  api_key: ${openai_key}
  api_base: https://chat.kiconnect.nrw/api/v1/
  temperature: 1
  max_tokens: 2048

harness_params:
  rubric_file: judge_rubric_v1.txt
  # The frozen Loop-A extraction bundle to judge (relative to artifacts/runs/):
  # v2 = best mean F1 (0.705, n=3); r1 = first repeat, no selection story.
  extraction_run: openai_oss_120b_prompt_v2/openai_oss_120b_n4_r1
  curated_data_markdown_dir: curated_data_markdown_by_doi
  output_dir: judge_mistral_v1
